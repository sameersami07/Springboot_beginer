<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Card Page | Impressive Navbar</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="navbar">
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="card.html" class="active">Card</a>
      <a href="randomuser.html">Random User</a>
      <a href="about.html">About</a>
      <a href="contact.html">Contact</a>
    </div>
  </nav>

  <section class="home-intro">
    <h1>Card Page</h1>
    <p>Click the button below to cycle between card profiles. This page uses the same styled navbar and toggled card content.</p>
  </section>

  <main class="main-content">
    <section class="card user-card">
      <img id="userImage" src="img/john.png" alt="User Image" class="profile-img">
      <div class="container">
        <h4 id="userName"><b>John Doe</b></h4>
        <p id="userGender">Male</p>
      </div>
    </section>

    <div class="button-row">
      <button class="btn" onclick="toggleCard()">Toggle User</button>
    </div>
  </main>

  <script src="js/script.js"></script>
</body>
</html>
